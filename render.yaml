services:
  - type: web
    name: trackinvest-api
    runtime: node
    region: singapore
    plan: free
    rootDir: trackinvest-api
    buildCommand: npm install --ignore-scripts
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: API_KEYS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: EXCHANGERATE_API_KEY
        sync: false
      - key: BROWSER_DISABLE
        value: "true"
