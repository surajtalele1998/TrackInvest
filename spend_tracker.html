<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F3F3F7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#111318" media="(prefers-color-scheme: dark)">
    <title>Spend Tracker | TrackInvest</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --cat-food:#E3724A; --cat-transport:#415F91; --cat-bills:#186D33; --cat-entertainment:#9C27B0; --cat-health:#D96200; --cat-shopping:#E91E63; --cat-groceries:#388E3C; --cat-rent:#5C6BC0; --cat-travel:#00ACC1; --cat-education:#7B1FA2; --cat-investment:#F57C00; --cat-income:#2E7D32; --cat-other:#8E9099; }
        .quick-add-bar { display:flex; gap:8px; margin-bottom:16px; align-items:center; }
        .quick-add-bar .md-input { flex:1; min-width:0; background:var(--md-surface-container-highest); padding:14px 16px; border-radius:16px; border:1.5px solid transparent; font-size:16px; transition:0.2s; }
        .quick-add-bar .md-input:focus { border-color:var(--md-primary); outline:none; }
        .quick-add-bar .btn-primary { padding:14px 20px; border-radius:16px; white-space:nowrap; flex-shrink:0; }
        .budget-rows { background:var(--md-surface-container); border-radius:20px; padding:12px 16px; }
        .budget-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--md-surface-container-highest); }
        .budget-row:last-child { border-bottom:none; }
        .budget-row .cat-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
        .budget-row .b-label { flex:1; font-size:13px; font-weight:500; color:var(--md-on-surface); }
        .budget-row .b-budget { font-size:12px; color:var(--md-outline); text-align:right; min-width:60px; }
        .budget-row .b-actual { font-size:14px; font-weight:600; text-align:right; min-width:70px; }
        .budget-row .b-status { font-size:11px; font-weight:600; min-width:40px; text-align:right; }
        .status-ok { color:var(--md-success); }
        .status-over { color:var(--md-error); }
        .filter-tabs { display:flex; gap:4px; padding:4px; background:var(--md-surface-container-high); border-radius:12px; margin-bottom:12px; overflow-x:auto; scrollbar-width:none; }
        .filter-tab { flex-shrink:0; padding:8px 14px; border:none; background:transparent; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; color:var(--md-on-surface-variant); transition:0.2s; white-space:nowrap; }
        .filter-tab.active { background:var(--md-primary-container); color:var(--md-on-primary-container); font-weight:600; }
        .spend-list { display:flex; flex-direction:column; gap:6px; }
        .spend-card { display:flex; align-items:center; gap:10px; padding:14px 16px; background:var(--md-surface-container); border-radius:16px; transition:0.2s; }
        .spend-card:active { background:var(--md-surface-container-highest); }
        .spend-date { font-size:11px; color:var(--md-outline); min-width:40px; font-weight:500; }
        .spend-comment { font-size:14px; color:var(--md-on-surface); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .spend-amt { font-size:15px; font-weight:600; white-space:nowrap; color:var(--md-on-surface); min-width:65px; text-align:right; }
        .cat-badge { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:12px; font-size:11px; font-weight:600; cursor:pointer; border:none; font-family:inherit; white-space:nowrap; }
        .cat-badge.uncat { background:var(--md-surface-container-highest); color:var(--md-on-surface-variant); }
        .chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
        .chart-card { background:var(--md-surface-container); border-radius:20px; padding:16px; }
        .chart-card.full { grid-column:1/-1; }
        .chart-card-title { font-size:11px; font-weight:600; color:var(--md-on-surface-variant); margin-bottom:10px; text-transform:uppercase; letter-spacing:0.5px; }
        .sankey-svg { width:100%; max-width:100%; height:180px; overflow:visible; }
        .import-sheet { position:fixed; bottom:0; left:0; right:0; margin:0 auto; max-width:600px; background:var(--md-surface-container-low); border-radius:28px 28px 0 0; padding:24px; z-index:1001; transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.1,0.7,0.1,1); max-height:70vh; overflow-y:auto; box-shadow:0 -8px 32px rgba(0,0,0,0.15); }
        .import-sheet.open { transform:translateY(0); }
        .import-scrim { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.4); z-index:1000; opacity:0; visibility:hidden; transition:0.3s; }
        .import-scrim.open { opacity:1; visibility:visible; }
        .biggest-item { background:var(--md-surface-container); border-radius:16px; padding:16px; margin-bottom:16px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:0.2s; }
        .biggest-item:active { transform:scale(0.98); }
        .del-icon-btn { width:32px; height:32px; border:none; background:transparent; color:var(--md-error); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:0.2s; }
        .del-icon-btn:active { background:var(--md-error-container); }
        @media(max-width:480px) {
            .chart-grid { grid-template-columns:1fr; }
            .chart-card { padding:12px; }
            .chart-card .chart-card-title { margin-bottom:6px; }
            .chart-card canvas { max-height:140px !important; }
            .quick-add-bar { flex-wrap:wrap; }
            .quick-add-bar .btn-primary { width:100%; }
            .import-sheet { max-width:100%; border-radius:20px 20px 0 0; padding:16px; }
            .budget-rows { padding:8px 12px; }
            .budget-row { flex-wrap:wrap; gap:4px; padding:8px 0; }
            .budget-row .b-label { width:100%; font-size:12px; }
            .budget-row .b-budget { font-size:11px; min-width:50px; }
            .budget-row .b-actual { font-size:13px; min-width:60px; }
            .spend-card { padding:10px 12px; gap:6px; }
            .spend-comment { font-size:13px; }
            .spend-amt { font-size:14px; min-width:55px; }
            .sankey-svg { height:140px; }
            .filter-tabs { gap:2px; padding:3px; }
            .filter-tab { padding:6px 10px; font-size:12px; }
        }
    </style>
</head>
<body>
    <!-- Import Sheet -->
    <div class="import-scrim" id="import-scrim" onclick="closeImportSheet()"></div>
    <div class="import-sheet" id="import-sheet">
        <div class="drag-handle"></div>
        <div class="sheet-title" style="margin-bottom:16px;">Import Transactions</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
            <button class="btn-primary" style="flex:1;padding:12px;" onclick="document.getElementById('csv-file-input').click()"><span class="material-symbols-rounded">description</span> CSV</button>
            <button class="btn-primary" style="flex:1;padding:12px;" onclick="document.getElementById('xlsx-file-input').click()"><span class="material-symbols-rounded">table_chart</span> XLSX</button>
            <button class="btn-secondary" style="flex:1;padding:12px;" onclick="document.getElementById('pdf-file-input').click()"><span class="material-symbols-rounded">picture_as_pdf</span> PDF</button>
        </div>
        <input type="file" id="csv-file-input" accept=".csv" style="display:none" onchange="importCSVFile(event)">
        <input type="file" id="pdf-file-input" accept=".pdf" style="display:none" onchange="importPDFFile(event)">
        <input type="file" id="xlsx-file-input" accept=".xlsx,.xls" style="display:none" onchange="importXLSXFile(event)">
        <div style="font-size:12px;color:var(--md-outline);">Expected: amount,comment,commit_time (DD/MM/YY, HH:MM AM/PM)</div>
        <div style="font-size:12px;color:var(--md-outline);margin-top:4px;">XLSX: columns amount, comment, commit_time or date</div>
        <button class="btn-secondary" style="width:100%;margin-top:16px;" onclick="closeImportSheet()">Cancel</button>
    </div>

    <!-- Spend Entry Sheet -->
    <div class="import-scrim" id="spend-scrim" onclick="closeSpendSheet()"></div>
    <div class="import-sheet" id="spend-sheet">
        <div class="drag-handle"></div>
        <div class="sheet-title" id="spend-sheet-title">Add Expense</div>
        <div class="input-container"><label>Amount (₹)</label><input type="number" id="spend-amt-input" class="md-input" placeholder="0.00" inputmode="decimal"></div>
        <div class="input-container"><label>Description</label><input type="text" id="spend-comment-input" class="md-input" placeholder="What for?" list="comment-suggestions"></div>
        <div class="input-container"><label>Date</label><input type="date" id="spend-date-input" class="md-input"></div>
        <div style="display:flex;gap:12px;margin-top:16px;">
            <button class="btn-secondary" id="spend-del-btn" style="display:none;color:var(--md-error);border-color:var(--md-error);flex:0.4;" onclick="deleteSpendEntry()">Delete</button>
            <button class="btn-primary" onclick="saveSpendEntry()" style="flex:1;"><span class="material-symbols-rounded">add</span> Add Expense</button>
        </div>
        <button class="btn-secondary" onclick="closeSpendSheet()" style="margin-top:8px;">Cancel</button>
    </div>

    <!-- FAB -->
    <button class="fab" onclick="openSpendSheet()" title="Add Expense (N)"><span class="material-symbols-rounded">add</span> Add Expense</button>

    <header class="top-app-bar">
        <button class="icon-btn" onclick="window.location.href='index.html'"><span class="material-symbols-rounded">arrow_back</span></button>
        <div class="app-title">Spend Tracker</div>
        <button class="icon-btn" onclick="openImportSheet()" title="Import"><span class="material-symbols-rounded">file_upload</span></button>
        <button class="icon-btn" onclick="showExportMenu()" title="Export"><span class="material-symbols-rounded">download</span></button>
        <button class="icon-btn" onclick="document.getElementById('ai-insights-output').style.display='none';renderAll()" title="Refresh"><span class="material-symbols-rounded">refresh</span></button>
    </header>

    <main class="container" style="padding-top:0;">
        <!-- Month Picker -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;">
            <button class="icon-btn" onclick="shiftMonth(-1)"><span class="material-symbols-rounded">chevron_left</span></button>
            <div style="font-size:18px;font-weight:500;color:var(--md-on-surface);" id="month-label"></div>
            <button class="icon-btn" onclick="shiftMonth(1)"><span class="material-symbols-rounded">chevron_right</span></button>
        </div>

        <!-- Hero -->
        <div class="hero-card" id="hero-section">
            <div class="hero-subtitle">Total Spent</div>
            <div class="hero-title" id="hero-total">₹0</div>
            <div class="chart-filters" style="margin-top:4px;gap:16px;">
                <span style="font-size:12px;opacity:0.8;" id="hero-count">0 txns</span>
                <span style="font-size:12px;opacity:0.8;" id="hero-avg">₹0/day</span>
                <span style="font-size:12px;opacity:0.8;" id="hero-vs-budget"></span>
            </div>
        </div>

        <!-- Quick Stats -->
        <div class="stat-row" id="quick-stats"></div>

        <datalist id="comment-suggestions"></datalist>

        <!-- Budget vs Actual -->
        <div id="budget-section" style="display:none; margin-bottom:16px;">
            <div style="font-size:14px;font-weight:600;color:var(--md-on-surface);margin-bottom:12px;display:flex;align-items:center;gap:8px;"><span class="material-symbols-rounded" style="font-size:18px;color:var(--md-primary);">compare_arrows</span> Budget vs Actual</div>
            <div class="budget-rows" id="budget-list"></div>
        </div>

        <!-- Charts -->
        <div class="chart-grid" id="charts-section">
            <div class="chart-card"><div class="chart-card-title">By Category</div><div style="height:170px;"><canvas id="catPieChart"></canvas></div></div>
            <div class="chart-card"><div class="chart-card-title">Daily Trend</div><div style="height:170px;"><canvas id="dailyTrendChart"></canvas></div></div>
            <div class="chart-card full"><div class="chart-card-title">Spend Flow</div><div class="sankey-container"><svg class="sankey-svg" id="sankey-svg"></svg></div></div>
        </div>

        <!-- Biggest Single Expense -->
        <div id="biggest-item-section" style="display:none;"></div>

        <!-- AI Actions -->
        <div style="display:flex;gap:8px;margin-bottom:12px;">
            <button class="btn-secondary" style="flex:1;padding:12px;" onclick="runAICategorization()" id="ai-cat-btn"><span class="material-symbols-rounded">auto_awesome</span> Auto-Categorize</button>
            <button class="btn-secondary" style="flex:1;padding:12px;" onclick="runAIInsights()" id="ai-insights-btn"><span class="material-symbols-rounded">insights</span> Insights</button>
        </div>
        <div id="ai-insights-output" style="display:none;background:var(--md-surface-container);border-radius:20px;padding:20px;margin-bottom:16px;font-size:14px;line-height:1.6;"></div>

        <!-- Filters -->
        <div class="filter-tabs">
            <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
            <button class="filter-tab" onclick="setFilter('uncat',this)">Uncategorized</button>
            <button class="filter-tab" onclick="setFilter('categorized',this)">Categorized</button>
            <button class="filter-tab" onclick="setFilter('biggest',this)">Biggest</button>
        </div>

        <!-- Transaction Actions -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-size:13px;color:var(--md-on-surface-variant);" id="list-count"></span>
            <div style="display:flex;gap:4px;">
                <button class="btn-icon" style="min-width:36px;min-height:36px;" onclick="deleteAllUncategorized()" title="Clear uncategorized"><span class="material-symbols-rounded" style="font-size:18px;color:var(--md-error);">filter_alt_off</span></button>
                <button class="btn-icon" style="min-width:36px;min-height:36px;" onclick="deleteAllEntries()" title="Clear month"><span class="material-symbols-rounded" style="font-size:18px;color:var(--md-error);">delete_sweep</span></button>
            </div>
        </div>
        <div class="spend-list" id="spend-list"></div>
        <div style="text-align:center;padding:8px 0;font-size:10px;color:var(--md-outline);opacity:0.4;user-select:none;"
            onclick="navigator.clipboard.writeText('v96');renderAll()" title="Build v96">v96</div>
        <div style="height:80px;"></div>
    </main>

    <script src="./shared_ai.js"></script>
    <script>
        const STORAGE_KEY = 'appHubInvestDb';
        function loadDB() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; } }
        function saveDB() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e) { alert('Storage failed'); } }
        let db = loadDB();
        if (!db.spendTracker) db.spendTracker = { entries: [], aiCategoryCache: {} };
        if (!db.spendTracker.entries) db.spendTracker.entries = [];

        let currentMonth = new Date().getMonth(), currentYear = new Date().getFullYear(), currentFilter = 'all';
        let catPieChart = null, dailyTrendChart = null;

        const CAT_COLORS = {
            'Food & Dining':'#E3724A','Transport':'#415F91','Bills & Utilities':'#186D33',
            'Entertainment':'#9C27B0','Health & Medical':'#D96200','Shopping':'#E91E63',
            'Groceries':'#388E3C','Rent':'#5C6BC0','Travel':'#00ACC1','Education':'#7B1FA2',
            'Investment':'#F57C00','Income':'#2E7D32','Other':'#8E9099'
        };

        // ── MAPPING: Monthly Planner categories → Spend Tracker categories ──
        const BUDGET_CAT_MAP = {
            'needs': ['Food & Dining','Groceries','Bills & Utilities','Rent','Health & Medical','Transport'],
            'wants': ['Entertainment','Shopping','Travel','Food & Dining'],
            'investments': ['Investment'],
            'customInvestments': ['Investment'],
            'income': ['Income']
        };

        // ── SPEND ENTRY SHEET ──
        let spendEditId = null;

        function openSpendSheet(id = null) {
            spendEditId = id;
            const title = document.getElementById('spend-sheet-title');
            const delBtn = document.getElementById('spend-del-btn');
            const saveBtn = document.querySelector('#spend-sheet .btn-primary');
            if (id) {
                title.innerText = 'Edit Expense';
                if (delBtn) delBtn.style.display = 'block';
                if (saveBtn) saveBtn.innerHTML = '<span class="material-symbols-rounded">check</span> Update';
                const e = db.spendTracker.entries.find(x => x.id === id);
                if (e) {
                    document.getElementById('spend-amt-input').value = e.amount;
                    document.getElementById('spend-comment-input').value = e.comment || '';
                    document.getElementById('spend-date-input').value = new Date(e.date).toISOString().split('T')[0];
                }
            } else {
                title.innerText = 'Add Expense';
                if (delBtn) delBtn.style.display = 'none';
                if (saveBtn) saveBtn.innerHTML = '<span class="material-symbols-rounded">add</span> Add Expense';
                document.getElementById('spend-amt-input').value = '';
                document.getElementById('spend-comment-input').value = '';
                document.getElementById('spend-date-input').value = new Date().toISOString().split('T')[0];
                setTimeout(() => document.getElementById('spend-amt-input').focus(), 200);
            }
            document.getElementById('spend-sheet').classList.add('open');
            document.getElementById('spend-scrim').classList.add('open');
        }

        function closeSpendSheet() {
            document.getElementById('spend-sheet').classList.remove('open');
            document.getElementById('spend-scrim').classList.remove('open');
            spendEditId = null;
        }

        function saveSpendEntry() {
            const amt = parseFloat(document.getElementById('spend-amt-input').value);
            const comment = document.getElementById('spend-comment-input').value.trim();
            const dateStr = document.getElementById('spend-date-input').value;
            if (!amt || amt <= 0) { Swal.fire({icon:'error',title:'Enter amount',timer:1200,showConfirmButton:false}); return; }
            const date = dateStr ? new Date(dateStr + 'T12:00:00') : new Date();
            const sanitized = DOMPurify.sanitize(comment, {ALLOWED_TAGS:[],ALLOWED_ATTR:[]});

            if (spendEditId) {
                const e = db.spendTracker.entries.find(x => x.id === spendEditId);
                if (e) { e.amount = amt; e.comment = sanitized; e.date = date.toISOString(); }
            } else {
                db.spendTracker.entries.push({
                    id: Date.now() + '_q' + Math.random().toString(36).slice(2,6),
                    amount: amt,
                    comment: sanitized,
                    date: date.toISOString(),
                    category: 'Uncategorized'
                });
            }
            saveDB();
            closeSpendSheet();
            updateCommentSuggestions();
            renderAll();
            haptic(30);
        }

        function deleteSpendEntry() {
            if (!spendEditId) return;
            Swal.fire({title:'Delete?',showCancelButton:true,confirmButtonColor:'var(--md-error)'}).then(r => {
                if (r.isConfirmed) {
                    db.spendTracker.entries = db.spendTracker.entries.filter(x => x.id !== spendEditId);
                    saveDB();
                    closeSpendSheet();
                    renderAll();
                }
            });
        }

        function updateCommentSuggestions() {
            const dl = document.getElementById('comment-suggestions');
            const comments = [...new Set(db.spendTracker.entries.map(e => e.comment).filter(Boolean))];
            dl.innerHTML = comments.map(c => `<option value="${DOMPurify.sanitize(c)}">`).join('');
        }
        function haptic(n) { try { navigator.vibrate(n); } catch(e) {} }

        // Keyboard shortcut
        document.addEventListener('keydown', e => {
            if (e.key === 'n' && !e.ctrlKey && !e.metaKey && !document.querySelector('.import-sheet.open')) {
                e.preventDefault(); openSpendSheet();
            }
        });

        // Enter to focus next in sheet
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('spend-amt-input').addEventListener('keydown', e => {
                if (e.key === 'Enter') document.getElementById('spend-comment-input').focus();
            });
            document.getElementById('spend-comment-input').addEventListener('keydown', e => {
                if (e.key === 'Enter') document.getElementById('spend-date-input').focus();
            });
            document.getElementById('spend-date-input').addEventListener('keydown', e => {
                if (e.key === 'Enter') saveSpendEntry();
            });
            updateCommentSuggestions();
            renderAll();
        });

        // ── IMPORT SHEET ──
        function openImportSheet() { document.getElementById('import-sheet').classList.add('open'); document.getElementById('import-scrim').classList.add('open'); }
        function closeImportSheet() { document.getElementById('import-sheet').classList.remove('open'); document.getElementById('import-scrim').classList.remove('open'); }

        // ── DATE ──
        function parseBuckwheatDate(str) {
            str = str.trim().replace(/\u202f/g,' ').replace(/\u2009/g,' ');
            const m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2}),\s*(\d{1,2}):(\d{2})\s*(am|pm)/i);
            if (m) { let y=2000+parseInt(m[3]),mo=parseInt(m[2])-1,d=parseInt(m[1]),h=parseInt(m[4]); if(m[6].toLowerCase()==='pm'&&h<12) h+=12; if(m[6].toLowerCase()==='am'&&h===12) h=0; return new Date(y,mo,d,h,parseInt(m[5])); }
            const d2 = new Date(str); if(!isNaN(d2)) return d2;
            return null;
        }
        function fmtDate(d) { return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}); }

        // ── GETTERS ──
        function getMonthEntries() { return db.spendTracker.entries.filter(e => { const d=new Date(e.date); return d.getMonth()===currentMonth && d.getFullYear()===currentYear; }); }
        function getFilteredEntries() {
            let e = getMonthEntries();
            if (currentFilter==='uncat') return e.filter(x => !x.category || x.category==='Uncategorized');
            if (currentFilter==='categorized') return e.filter(x => x.category && x.category!=='Uncategorized');
            if (currentFilter==='biggest') return [...e].sort((a,b) => b.amount - a.amount).slice(0,5);
            return e;
        }

        // ── BUDGET VS ACTUAL ──
        function renderBudgetVsActual() {
            const section = document.getElementById('budget-section');
            const plan = db.monthlyPlanConfig;
            if (!plan || !plan.income || plan.income.length === 0) { section.style.display = 'none'; return; }
            section.style.display = 'block';
            const list = document.getElementById('budget-list');
            const entries = getMonthEntries();
            const totals = {};
            entries.forEach(e => { const c = e.category || 'Other'; if(!totals[c]) totals[c] = 0; totals[c] += e.amount; });

            // Build budget categories → spend mapping
            const rows = [];
            let totalBudget = 0, totalActual = 0;

            // Income
            const incomeBudget = plan.income.reduce((s,i) => s + (parseFloat(i.amount)||0), 0);
            rows.push({ label: 'Income', budget: incomeBudget, actual: 0, color: '#2E7D32', isIncome: true });

            // Needs
            const needsBudget = (plan.needs||[]).reduce((s,i) => s+(parseFloat(i.amount)||0),0);
            const needsActual = sumOfCategories(totals, BUDGET_CAT_MAP.needs);
            if (needsBudget > 0 || needsActual > 0) rows.push({ label: 'Needs (Bills, Food, Rent)', budget: needsBudget, actual: needsActual, color: '#186D33' });

            // Wants
            const wantsBudget = (plan.wants||[]).reduce((s,i) => s+(parseFloat(i.amount)||0),0);
            const wantsActual = sumOfCategories(totals, BUDGET_CAT_MAP.wants);
            if (wantsBudget > 0 || wantsActual > 0) rows.push({ label: 'Wants (Fun, Shopping, Travel)', budget: wantsBudget, actual: wantsActual, color: '#E91E63' });

            // Investments
            const invBudget = (plan.investments||[]).reduce((s,i) => s+(parseFloat(i.amount)||0),0);
            const invActual = sumOfCategories(totals, BUDGET_CAT_MAP.investments);
            if (invBudget > 0 || invActual > 0) rows.push({ label: 'Investments', budget: invBudget, actual: invActual, color: '#F57C00' });

            // Custom Investments
            const custInvBudget = (plan.customInvestments||[]).reduce((s,i) => s+(parseFloat(i.amount)||0),0);
            const custInvActual = sumOfCategories(totals, BUDGET_CAT_MAP.customInvestments);
            if (custInvBudget > 0 || custInvActual > 0) rows.push({ label: 'Extra Investments', budget: custInvBudget, actual: custInvActual, color: '#F57C00' });

            // Other (uncategorized spend)
            const otherActual = entries.filter(e => !e.category || e.category==='Uncategorized').reduce((s,e) => s+e.amount, 0);
            if (otherActual > 0) rows.push({ label: 'Uncategorized', budget: 0, actual: otherActual, color: '#8E9099' });

            totalActual = entries.reduce((s,e) => s+e.amount, 0);
            // budget total = wants + needs + investments
            totalBudget = rows.filter(r => !r.isIncome).reduce((s,r) => s+r.budget, 0);

            let html = '';
            rows.forEach(r => {
                const diff = r.budget - r.actual;
                const status = r.isIncome ? '' : (diff >= 0 ? `<span class="status-ok">✓</span>` : `<span class="status-over">! ${Math.abs(diff).toLocaleString('en-IN')}</span>`);
                html += `<div class="budget-row">
                    <div class="cat-dot" style="background:${r.color}"></div>
                    <div class="b-label">${r.label}</div>
                    <div class="b-budget">${r.isIncome ? '' : '₹' + r.budget.toLocaleString('en-IN')}</div>
                    <div class="b-actual" style="color:${r.isIncome ? 'var(--md-success)' : (diff < 0 ? 'var(--md-error)' : 'var(--md-on-surface)')}">₹${r.actual.toLocaleString('en-IN')}</div>
                    <div class="b-status">${status}</div>
                </div>`;
            });

            // Total row
            const totalDiff = totalBudget - totalActual;
            html += `<div class="budget-row" style="border-top:2px solid var(--md-surface-container-highest);padding-top:12px;margin-top:4px;font-weight:700;">
                <div class="cat-dot" style="background:var(--md-primary)"></div>
                <div class="b-label">Total Spend</div>
                <div class="b-budget">₹${totalBudget.toLocaleString('en-IN')}</div>
                <div class="b-actual" style="color:${totalDiff < 0 ? 'var(--md-error)' : 'var(--md-success)'}">₹${totalActual.toLocaleString('en-IN')}</div>
                <div class="b-status">${totalDiff >= 0 ? `<span class="status-ok">✓ ${totalDiff.toLocaleString('en-IN')}</span>` : `<span class="status-over">+${Math.abs(totalDiff).toLocaleString('en-IN')}</span>`}</div>
            </div>`;

            list.innerHTML = html;

            // Update hero with budget info
            const heroBudget = document.getElementById('hero-vs-budget');
            if (totalBudget > 0) {
                heroBudget.innerText = totalActual <= totalBudget ? `✓ Under budget by ₹${(totalBudget-totalActual).toLocaleString('en-IN')}` : `⚠ Over budget by ₹${(totalActual-totalBudget).toLocaleString('en-IN')}`;
                heroBudget.style.color = totalActual <= totalBudget ? 'rgba(255,255,255,0.8)' : 'rgba(255,200,200,0.9)';
            }
        }
        function sumOfCategories(totals, cats) { return cats.reduce((s,c) => s + (totals[c]||0), 0); }

        // ── CSV IMPORT ──
        function importCSVFile(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const lines = ev.target.result.split(/\r?\n/).filter(l=>l.trim());
                if(lines.length<2) { Swal.fire('Error','CSV needs header + data','error'); return; }
                const cols = lines[0].toLowerCase().split(',').map(c=>c.trim());
                const amtIdx=cols.indexOf('amount'), commentIdx=cols.indexOf('comment'), timeIdx=cols.indexOf('commit_time');
                if(amtIdx===-1||timeIdx===-1){ Swal.fire('Error','Need amount, comment, commit_time','error'); return; }
                let added=0, skipped=0;
                for(let i=1;i<lines.length;i++) {
                    const p = parseCSVLine(lines[i]);
                    const amt=parseFloat(p[amtIdx]), comment=commentIdx>=0?(p[commentIdx]||''):'', date=parseBuckwheatDate(p[timeIdx]);
                    if(!isNaN(amt)&&date) { db.spendTracker.entries.push({id:Date.now()+'_'+i+'_'+Math.random().toString(36).slice(2,6),amount:amt,comment:DOMPurify.sanitize(comment,{ALLOWED_TAGS:[],ALLOWED_ATTR:[]}),date:date.toISOString(),category:'Uncategorized'}); added++; }
                    else skipped++;
                }
                saveDB(); e.target.value='';
                Swal.fire({icon:'success',title:'Imported',text:`${added} added${skipped?', '+skipped+' skipped':''}`,timer:2000,showConfirmButton:false});
                closeImportSheet(); renderAll();
            };
            reader.readAsText(file);
        }
        function parseCSVLine(l) { const r=[]; let c='',q=false; for(let i=0;i<l.length;i++){const ch=l[i]; if(q){if(ch==='"'){if(i+1<l.length&&l[i+1]==='"'){c+='"';i++}else q=false}else c+=ch}else{if(ch==='"')q=true;else if(ch===','){r.push(c.trim());c=''}else c+=ch}} r.push(c.trim()); return r; }

        function importXLSXFile(e) {
            const file=e.target.files[0]; if(!file) return;
            const reader=new FileReader();
            reader.onload=function(ev) {
                const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
                const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                if(!json||!json.length){Swal.fire('Error','Empty sheet','error');return;}
                let added=0;
                json.forEach((row,i)=>{
                    const amt=parseFloat(row.amount||row.Amount||row.AMOUNT||0);
                    const comment=String(row.comment||row.Comment||row.COMMENT||row.description||row.Description||'');
                    let date=null; const dStr=row.commit_time||row.Commit_time||row.date||row.Date||'';
                    date = parseBuckwheatDate(String(dStr)) || (dStr ? new Date(String(dStr)) : null);
                    if(!isNaN(amt)&&amt>0&&date) { db.spendTracker.entries.push({id:Date.now()+'_x'+i,amount:amt,comment:DOMPurify.sanitize(comment,{ALLOWED_TAGS:[],ALLOWED_ATTR:[]}),date:date.toISOString(),category:'Uncategorized'}); added++; }
                });
                saveDB(); e.target.value='';
                Swal.fire({icon:'success',title:'Imported',text:`${added} added`,timer:2000,showConfirmButton:false});
                closeImportSheet(); renderAll();
            };
            reader.readAsArrayBuffer(file);
        }

        function importPDFFile(e) {
            const file=e.target.files[0]; if(!file) return;
            const reader=new FileReader();
            reader.onload=function(ev) {
                const lines=ev.target.result.split(/\r?\n/).filter(l=>l.trim());
                let added=0;
                lines.forEach((line,i)=>{
                    const parts=line.split(/\t|,/);
                    if(parts.length>=2) { const amt=parseFloat(parts[0].replace(/[₹$,]/g,'')); if(!isNaN(amt)&&amt>0){const d=new Date(); db.spendTracker.entries.push({id:Date.now()+'_p'+i,amount:amt,comment:DOMPurify.sanitize(parts.slice(1).join(' '),{ALLOWED_TAGS:[],ALLOWED_ATTR:[]}),date:d.toISOString(),category:'Uncategorized'}); added++; } }
                });
                if(added>0){saveDB();Swal.fire({icon:'success',title:'Imported',text:`${added} added`,timer:2000,showConfirmButton:false});closeImportSheet();renderAll();}
                else Swal.fire('Info','No data could be parsed. Try CSV/XLSX instead.','info');
                e.target.value='';
            };
            reader.readAsText(file);
        }

        async function runAICategorization() {
            const uncat = db.spendTracker.entries.filter(e => !e.category || e.category==='Uncategorized');
            if(uncat.length===0){Swal.fire('Info','Nothing to categorize','info');return;}
            const btn=document.getElementById('ai-cat-btn'); btn.disabled=true; btn.innerHTML='<span class="material-symbols-rounded ai-loading-icon">autorenew</span> Categorizing...';
            const prompt = `You are a financial categorizer. Categorize each expense into: ${Object.keys(CAT_COLORS).join(', ')}. Respond ONLY with valid JSON array: [{"comment":"exact match","category":"..."}]. No markdown.\n\n${JSON.stringify(uncat.map(e=>({comment:e.comment,amount:e.amount})))}`;
            try {
                const resp = await callAI(prompt, 'spend_categorize_2');
                const cats = JSON.parse(resp.replace(/```json|```/gi,'').trim());
                if(!Array.isArray(cats)) throw new Error('Not array');
                let m=0; uncat.forEach(e=>{const x=cats.find(c=>c.comment===e.comment); if(x&&CAT_COLORS[x.category]){e.category=x.category;m++;}});
                saveDB(); Swal.fire({icon:'success',title:'Done',text:`${m}/${uncat.length} categorized`,timer:2000,showConfirmButton:false}); renderAll();
            } catch(e) { showManualCategoryPicker(uncat); }
            btn.disabled=false; btn.innerHTML='<span class="material-symbols-rounded">auto_awesome</span> Auto-Categorize';
        }

            const entries=getMonthEntries(); const total=entries.reduce((s,e)=>s+e.amount,0); const cats={}; entries.forEach(e=>{const c=e.category||'Uncategorized';if(!cats[c])cats[c]=0;cats[c]+=e.amount;});
            const rows=entries.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e=>{const d=new Date(e.date);return `<tr><td>${d.getDate()}/${d.getMonth()+1}</td><td>${DOMPurify.sanitize(e.comment||'—')}</td><td>${e.category||'Uncategorized'}</td><td style="text-align:right;">₹${e.amount.toLocaleString('en-IN')}</td></tr>`;}).join('');
            const html=`<div style="font-family:Roboto,sans-serif;padding:24px;color:#1a1a1a;"><h1 style="font-size:24px;color:#415F91;">Spend Report</h1><p style="color:#666;">${new Date(currentYear,currentMonth).toLocaleString('default',{month:'long',year:'numeric'})}</p><div style="font-size:36px;font-weight:400;margin:16px 0;">₹${total.toLocaleString('en-IN')}</div><h3>Category Split</h3>${Object.entries(cats).map(([c,v])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;"><span>${c}</span><span>₹${v.toLocaleString('en-IN')}</span></div>`).join('')}<hr style="margin:16px 0;"><table style="width:100%;border-collapse:collapse;font-size:12px;"><tr style="background:#f0f0f0;"><th style="padding:8px;text-align:left;">Date</th><th style="padding:8px;text-align:left;">Comment</th><th style="padding:8px;text-align:left;">Category</th><th style="padding:8px;text-align:right;">Amount</th></tr>${rows}</table></div>`;
            const el=document.createElement('div'); el.innerHTML=html; document.body.appendChild(el);
            html2pdf().set({margin:10,filename:`spends_${currentMonth+1}_${currentYear}.pdf`,image:{type:'jpeg',quality:0.98},html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(el).save().then(()=>document.body.removeChild(el));
            Swal.close();
        }
        function downloadFile(c,name,mime){const b=new Blob([c],{type:mime});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href);}

        // ── QUICK STATS ──
        function renderQuickStats() {
            const e=getMonthEntries(); const total=e.reduce((s,x)=>s+x.amount,0); const day=Math.min(new Date().getDate(),new Date(currentYear,currentMonth+1,0).getDate()); const avg=Math.round(total/day);
            const cats={}; e.forEach(x=>{const c=x.category||'Uncategorized';if(!cats[c])cats[c]=0;cats[c]+=x.amount;});
            const topCat=Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];
            document.getElementById('hero-total').innerText='₹'+total.toLocaleString('en-IN');
            document.getElementById('hero-count').innerText=e.length+' txns';
            document.getElementById('hero-avg').innerText='₹'+avg.toLocaleString('en-IN')+'/day';
            document.getElementById('month-label').innerText=new Date(currentYear,currentMonth).toLocaleString('default',{month:'long',year:'numeric'});
            document.getElementById('quick-stats').innerHTML=`
                <div class="stat-chip"><div class="stat-chip-label">Avg/Day</div><div class="stat-chip-val">₹${avg.toLocaleString('en-IN')}</div></div>
                <div class="stat-chip"><div class="stat-chip-label">Top Category</div><div class="stat-chip-val">${topCat?topCat[0]:'—'}</div></div>
                <div class="stat-chip"><div class="stat-chip-label">Categories</div><div class="stat-chip-val">${Object.keys(cats).length}</div></div>
                <div class="stat-chip"><div class="stat-chip-label">Biggest</div><div class="stat-chip-val">₹${e.length>0?Math.max(...e.map(x=>x.amount)).toLocaleString('en-IN'):0}</div></div>`;
        }

        // ── MAIN ──
        function renderAll() { renderQuickStats(); renderBudgetVsActual(); renderCharts(); renderSankey(); renderBiggestItem(); renderSpendList(); updateCommentSuggestions(); }
    </script>
</body>
</html>
